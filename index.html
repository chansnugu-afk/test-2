<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeTable</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
}

body{
    background:#111;
    color:white;
    overflow-x:hidden;
}

.app{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:100px;
}

/* 상단 */

.top{
    width:100%;
    padding:45px 20px;
    text-align:center;
    transition:0.5s;
}

.danger{
    background:linear-gradient(135deg,#5a0000,#cf0000);
}

.safe{
    background:linear-gradient(135deg,#004d2a,#00b85c);
}

.connectedCompact{
    padding:25px 20px;
}

.connectedCompact .title{
    font-size:34px;
}

.connectedCompact .status{
    font-size:19px;
}

.connectedCompact .device{
    font-size:15px;
}

.title{
    font-size:42px;
    font-weight:bold;
}

.status{
    font-size:24px;
    margin-top:10px;
}

.device{
    margin-top:8px;
    font-size:17px;
}

/* 버튼 */

.connectBtn{
    margin-top:20px;
    padding:14px 28px;
    border:none;
    border-radius:18px;
    background:white;
    color:black;
    font-size:17px;
    cursor:pointer;
    font-weight:bold;
}

/* 페이지 */

.page{
    display:none;
    width:100%;
    padding:25px;
}

.active{
    display:block;
}

/* 카드 */

.card{
    background:#1d1d1d;
    border-radius:22px;
    padding:22px;
    margin-bottom:20px;
}

/* 경고 */

.warning{
    margin-top:25px;
    padding:20px;
    border-radius:15px;
    background:#ff3b3b;
    font-size:20px;
    display:none;
}

/* 하단 메뉴 */

.bottomNav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:90px;
    background:#181818;
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:2px solid #333;
}

.navBtn{
    background:none;
    border:none;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
    color:#8d8d8d;
    transition:0.3s;
}

.activeNav{
    color:#b266ff;
}

.navText{
    font-size:13px;
}

.iconSVG{
    width:28px;
    height:28px;
    stroke:currentColor;
    fill:none;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
}

/* 입력창 */

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    margin-bottom:20px;
    font-size:16px;
}

/* 그래프 */

canvas{
    background:white;
    border-radius:15px;
    padding:10px;
}

.historyCard{
    background:#272727;
    border-radius:15px;
    padding:15px;
    margin-top:15px;
    cursor:pointer;
    transition:0.3s;
}

.historyCard:hover{
    background:#343434;
}

.infoBox{
    margin-top:20px;
    font-size:18px;
    line-height:1.9;
}

.detailBox{
    margin-top:20px;
}

</style>
</head>

<body>

<div class="app">

    <!-- 상단 -->
    <div class="top danger" id="topArea">

        <div class="title">SafeTable</div>

        <div class="status" id="statusText">
            ⚠ 분실 위험 있음
        </div>

        <div class="device" id="deviceText">
            현재 연결된 기기 없음
        </div>

        <button class="connectBtn"
            id="connectBtn"
            onclick="toggleDevice()">

            장치 연결하기

        </button>

    </div>

    <!-- 홈 -->
    <div class="page active" id="homePage">

        <div class="card">

            <h2>현재 상태</h2>

            <div class="infoBox">

                ⏱ 총 연결 시간 :
                <span id="connectedTime">0분 0초</span>

                <br><br>

                📡 현재 상태 :
                <span id="liveState">연결 대기중</span>

            </div>

            <div class="warning" id="warningBox">
                🚨 분실물 감지됨! 물건을 확인하세요.
            </div>

        </div>

    </div>

    <!-- 설정 -->
    <div class="page" id="settingPage">

        <div class="card">

            <h2>설정</h2>

            <!-- 사용자 정보 -->

            <div class="historyCard"
                onclick="toggleUserInfo()">

                <h3>👤 사용자 정보</h3>

                <p>
                    계정 및 사용자 설정 관리
                </p>

            </div>

            <div id="userInfoBox"
                style="display:none; margin-top:15px;">

                <label>사용자 이름</label>
                <input type="text"
                    placeholder="홍길동">

                <label>계정 이메일</label>
                <input type="text"
                    placeholder="safetable@email.com">

                <label>계정 변경</label>
                <input type="text"
                    placeholder="다른 계정으로 변경">

            </div>

            <br>

            <!-- 연결 기기 -->

            <div class="historyCard">

                <h3>📡 연결된 기기</h3>

                <p id="connectedDeviceInfo">
                    현재 연결된 기기 없음
                </p>

            </div>

            <br>

            <!-- 압력 설정 -->

            <label>압력 감지 시간 (초)</label>

            <input type="number"
                id="timeLimit"
                value="10">

        </div>

    </div>

    <!-- 현재 그래프 -->
    <div class="page" id="graphPage">

        <div class="card">

            <h2>현재 압력값 그래프</h2>

            <canvas id="pressureChart"></canvas>

        </div>

    </div>

    <!-- 이전 기록 -->
    <div class="page" id="historyPage">

        <div class="card">

            <h2>이전 사용 기록</h2>

            <div id="historyContainer"></div>

            <div class="detailBox" id="detailBox"></div>

        </div>

    </div>

</div>

<!-- 하단 메뉴 -->

<div class="bottomNav">

    <!-- 홈 -->
    <button class="navBtn activeNav"
        onclick="showPage('homePage', this)">

        <svg class="iconSVG" viewBox="0 0 24 24">
            <path d="M3 10.5L12 3L21 10.5"/>
            <path d="M5 9.5V21H19V9.5"/>
        </svg>

        <div class="navText">홈</div>

    </button>

    <!-- 설정 -->
    <button class="navBtn"
        onclick="showPage('settingPage', this)">

        <svg class="iconSVG" viewBox="0 0 24 24">
            <path d="M12 8.5A3.5 3.5 0 1 0 12 15.5A3.5 3.5 0 1 0 12 8.5Z"/>
            <path d="M19.4 15
            L21 16
            L19 19
            L17.5 18
            C16.9 18.4 16.3 18.7 15.6 18.9
            L15 21H9
            L8.4 18.9
            C7.7 18.7 7.1 18.4 6.5 18
            L5 19
            L3 16
            L4.6 15
            C4.5 14.3 4.5 13.7 4.6 13
            L3 12
            L5 9
            L6.5 10
            C7.1 9.6 7.7 9.3 8.4 9.1
            L9 7H15
            L15.6 9.1
            C16.3 9.3 16.9 9.6 17.5 10
            L19 9
            L21 12
            L19.4 13
            C19.5 13.7 19.5 14.3 19.4 15Z"/>
        </svg>

        <div class="navText">설정</div>

    </button>

    <!-- 그래프 -->
    <button class="navBtn"
        onclick="showPage('graphPage', this)">

        <svg class="iconSVG" viewBox="0 0 24 24">
            <path d="M3 3V21H21"/>
            <path d="M7 16L11 12L14 14L20 7"/>
            <circle cx="7" cy="16" r="1"/>
            <circle cx="11" cy="12" r="1"/>
            <circle cx="14" cy="14" r="1"/>
            <circle cx="20" cy="7" r="1"/>
        </svg>

        <div class="navText">현재 그래프</div>

    </button>

    <!-- 기록 -->
    <button class="navBtn"
        onclick="showPage('historyPage', this)">

        <svg class="iconSVG" viewBox="0 0 24 24">
            <path d="M4 5H20V19H4Z"/>
            <path d="M8 9H16"/>
            <path d="M8 13H16"/>
        </svg>

        <div class="navText">이전 기록</div>

    </button>

</div>

<script>

/* 변수 */

let connected = false;
let connectSeconds = 0;
let sameTime = 0;
let interval = null;
let warningSent = false;

let historyData = [];

let startTime = "";
let currentGraphData = [];
let currentGraphLabels = [];

/* 페이지 이동 */

function showPage(pageId, element){

    let pages =
        document.querySelectorAll(".page");

    pages.forEach(page=>{
        page.classList.remove("active");
    });

    document.getElementById(pageId)
        .classList.add("active");

    let navs =
        document.querySelectorAll(".navBtn");

    navs.forEach(nav=>{
        nav.classList.remove("activeNav");
    });

    element.classList.add("activeNav");

}

/* 사용자 정보 */

function toggleUserInfo(){

    const box =
        document.getElementById("userInfoBox");

    if(box.style.display === "none"){

        box.style.display = "block";

    }

    else{

        box.style.display = "none";

    }

}

/* 그래프 */

const ctx =
document.getElementById('pressureChart');

const pressureChart = new Chart(ctx, {

    type:'line',

    data:{
        labels:[],
        datasets:[{
            label:'압력값',
            data:[],
            borderColor:'#b266ff',
            borderWidth:3,
            tension:0.4
        }]
    },

    options:{
        responsive:true,
        scales:{
            y:{
                min:1,
                max:100
            }
        }
    }

});

/* 장치 연결/해제 */

function toggleDevice(){

    const topArea =
        document.getElementById("topArea");

    const statusText =
        document.getElementById("statusText");

    const deviceText =
        document.getElementById("deviceText");

    const connectBtn =
        document.getElementById("connectBtn");

    const liveState =
        document.getElementById("liveState");

    if(!connected){

        connected = true;
        warningSent = false;
        sameTime = 0;

        currentGraphData = [];
        currentGraphLabels = [];

        let now = new Date();

        startTime =
            now.getHours().toString().padStart(2,'0')
            + ":" +
            now.getMinutes().toString().padStart(2,'0');

        topArea.classList.remove("danger");
        topArea.classList.add("safe");
        topArea.classList.add("connectedCompact");

        statusText.innerHTML =
            "✔ 기기 연결됨";

        deviceText.innerHTML =
            "연결된 기기 : Table Sensor #03";

        connectBtn.innerHTML =
            "사용 그만하기";

        liveState.innerHTML =
            "압력 감지중";

        document.getElementById("connectedDeviceInfo")
            .innerHTML =
            "Table Sensor #03 연결됨";

        startPressure();

    }

    else{

        connected = false;

        clearInterval(interval);

        let now = new Date();

        let endTime =
            now.getHours().toString().padStart(2,'0')
            + ":" +
            now.getMinutes().toString().padStart(2,'0');

        let totalMin =
            Math.floor(connectSeconds / 60);

        /* 기록 저장 */

        historyData.unshift({
            start:startTime,
            end:endTime,
            total:totalMin + "분",
            graph:[...currentGraphData],
            labels:[...currentGraphLabels]
        });

        renderHistory();

        /* 그래프 초기화 */

        pressureChart.data.labels = [];
        pressureChart.data.datasets[0].data = [];
        pressureChart.update();

        /* 상태 초기화 */

        connectSeconds = 0;

        document.getElementById("connectedTime")
            .innerHTML = "0분 0초";

        document.getElementById("warningBox")
            .style.display = "none";

        document.getElementById("connectedDeviceInfo")
            .innerHTML =
            "현재 연결된 기기 없음";

        topArea.classList.remove("safe");
        topArea.classList.remove("connectedCompact");
        topArea.classList.add("danger");

        statusText.innerHTML =
            "⚠ 분실 위험 있음";

        deviceText.innerHTML =
            "현재 연결된 기기 없음";

        connectBtn.innerHTML =
            "장치 연결하기";

        liveState.innerHTML =
            "연결 종료됨";

    }

}

/* 연결 시간 */

setInterval(()=>{

    if(connected){

        connectSeconds++;

        let min =
            Math.floor(connectSeconds / 60);

        let sec =
            connectSeconds % 60;

        document.getElementById("connectedTime")
            .innerHTML =
            min + "분 " + sec + "초";

    }

},1000);

/* 압력 감지 */

function startPressure(){

    let limit =
        parseInt(
            document.getElementById("timeLimit").value
        );

    interval = setInterval(()=>{

        /* 거의 일정한 압력 */

        let pressureValue =
            49 + (Math.random() * 2);

        let current = new Date();

        let timeLabel =
            current.getHours().toString().padStart(2,'0')
            + ":" +
            current.getMinutes().toString().padStart(2,'0')
            + ":" +
            current.getSeconds().toString().padStart(2,'0');

        pressureChart.data.labels.push(timeLabel);

        pressureChart.data.datasets[0]
            .data.push(pressureValue);

        pressureChart.update();

        currentGraphData.push(pressureValue);
        currentGraphLabels.push(timeLabel);

        sameTime++;

        /* 경고 1번만 */

        if(sameTime >= limit && !warningSent){

            warningSent = true;

            document.getElementById("warningBox")
                .style.display = "block";

            alert(
                "분실물 감지! 물건을 확인하세요."
            );

        }

    },1000);

}

/* 기록 출력 */

function renderHistory(){

    const container =
        document.getElementById("historyContainer");

    container.innerHTML = "";

    historyData.forEach((item,index)=>{

        container.innerHTML += `

        <div class="historyCard"
            onclick="showHistory(${index})">

            <h3>사용 기록 #${index+1}</h3>

            <p>
                ${item.start} ~ ${item.end}
            </p>

            <p>
                총 사용 시간 :
                ${item.total}
            </p>

        </div>

        `;

    });

}

/* 기록 상세 */

function showHistory(index){

    const item = historyData[index];

    document.getElementById("detailBox")
        .innerHTML = `

        <br>

        <h3>
            사용 시간 :
            ${item.start} ~ ${item.end}
        </h3>

        <br>

        <h3>
            총 사용 시간 :
            ${item.total}
        </h3>

        <br>

        <p>
            압력값 기록 :
        </p>

        <br>

        <p>
            ${item.graph
                .map(v=>v.toFixed(1))
                .join(" → ")}
        </p>

        `;

}

</script>

</body>
</html>
