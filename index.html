<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeTable</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Pretendard', sans-serif;
    }

    body{
        background:#111;
        color:white;
        transition:0.5s;
        overflow-x:hidden;
    }

    .app{
        width:100%;
        min-height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        padding-bottom:100px;
    }

    .top{
        width:100%;
        padding:40px 20px;
        text-align:center;
        transition:0.5s;
    }

    .danger{
        background:linear-gradient(135deg,#5a0000,#c90000);
    }

    .safe{
        background:linear-gradient(135deg,#006b2d,#00b85c);
    }

    .title{
        font-size:40px;
        font-weight:bold;
        margin-bottom:10px;
    }

    .status{
        font-size:24px;
        margin-top:15px;
    }

    .device{
        margin-top:10px;
        opacity:0.9;
    }

    .connectBtn{
        margin-top:25px;
        padding:15px 30px;
        border:none;
        border-radius:20px;
        background:white;
        color:black;
        font-size:18px;
        cursor:pointer;
        font-weight:bold;
    }

    .page{
        display:none;
        width:100%;
        padding:25px;
    }

    .active{
        display:block;
    }

    .card{
        background:#1e1e1e;
        border-radius:20px;
        padding:20px;
        margin-bottom:20px;
        box-shadow:0 0 15px rgba(0,0,0,0.3);
    }

    .card h2{
        margin-bottom:15px;
    }

    .bottomNav{
        position:fixed;
        bottom:0;
        left:0;
        width:100%;
        height:80px;
        background:#181818;
        display:flex;
        justify-content:space-around;
        align-items:center;
        border-top:2px solid #333;
    }

    .navBtn{
        color:white;
        background:none;
        border:none;
        font-size:18px;
        cursor:pointer;
    }

    input{
        width:100%;
        padding:12px;
        border-radius:10px;
        border:none;
        margin-top:10px;
        margin-bottom:20px;
        font-size:16px;
    }

    .warning{
        margin-top:20px;
        padding:20px;
        border-radius:15px;
        background:#ff4444;
        font-size:20px;
        display:none;
        animation:blink 1s infinite;
    }

    @keyframes blink{
        0%{opacity:1;}
        50%{opacity:0.5;}
        100%{opacity:1;}
    }

    .simulateBtn{
        margin-top:15px;
        padding:15px;
        width:100%;
        border:none;
        border-radius:15px;
        background:#00b85c;
        color:white;
        font-size:18px;
        cursor:pointer;
    }

    canvas{
        background:white;
        border-radius:15px;
        padding:10px;
    }

</style>
</head>

<body>

<div class="app">

    <div class="top danger" id="topArea">

        <div class="title">SafeTable</div>

        <div class="status" id="statusText">
            ⚠ 분실 위험 있음
        </div>

        <div class="device" id="deviceText">
            현재 연결된 기기 없음
        </div>

        <button class="connectBtn" onclick="connectDevice()">
            기기 연결하기
        </button>

    </div>

    <!-- 기본창 -->
    <div class="page active" id="homePage">

        <div class="card">
            <h2>현재 상태</h2>

            <p>
                테이블 위에 물건이 일정 시간 이상 감지되면
                사용자에게 경고 알림을 전송합니다.
            </p>

            <div class="warning" id="warningBox">
                🚨 분실물 감지됨! 물건을 확인하세요.
            </div>

        </div>

    </div>

    <!-- 설정창 -->
    <div class="page" id="settingPage">

        <div class="card">

            <h2>사용자 정보</h2>

            <label>사용자 이름</label>
            <input type="text" placeholder="이름 입력">

            <label>기기 이름</label>
            <input type="text" placeholder="테이블 3번">

            <label>압력 인식 시간 (초)</label>
            <input type="number" id="timeLimit" value="10">

            <label>알림 방식</label>
            <input type="text" placeholder="앱 알림">

        </div>

    </div>

    <!-- 압력값 -->
    <div class="page" id="graphPage">

        <div class="card">

            <h2>압력 변화 그래프</h2>

            <canvas id="pressureChart"></canvas>

            <button class="simulateBtn" onclick="startSimulation()">
                시뮬레이션 시작
            </button>

        </div>

    </div>

</div>

<!-- 하단 메뉴 -->
<div class="bottomNav">

    <button class="navBtn" onclick="showPage('homePage')">
        기본창
    </button>

    <button class="navBtn" onclick="showPage('settingPage')">
        설정창
    </button>

    <button class="navBtn" onclick="showPage('graphPage')">
        압력값
    </button>

</div>

<script>

    let connected = false;
    let simulationRunning = false;
    let pressureValue = 0;
    let sameTime = 0;

    function connectDevice(){

        connected = true;

        document.getElementById("topArea").classList.remove("danger");
        document.getElementById("topArea").classList.add("safe");

        document.getElementById("statusText").innerHTML =
            "✔ 기기 연결됨";

        document.getElementById("deviceText").innerHTML =
            "연결된 기기 : Table Sensor #03";

    }

    function showPage(pageId){

        let pages = document.querySelectorAll(".page");

        pages.forEach(page=>{
            page.classList.remove("active");
        });

        document.getElementById(pageId).classList.add("active");

    }

    const ctx = document.getElementById('pressureChart');

    const pressureChart = new Chart(ctx, {
        type:'line',
        data:{
            labels:[],
            datasets:[{
                label:'압력값',
                data:[],
                borderColor:'red',
                borderWidth:3,
                tension:0.3
            }]
        },
        options:{
            responsive:true,
            scales:{
                y:{
                    beginAtZero:true
                }
            }
        }
    });

    function startSimulation(){

        if(simulationRunning) return;

        simulationRunning = true;

        pressureValue = 50;

        let count = 0;

        let limit =
            parseInt(document.getElementById("timeLimit").value);

        const interval = setInterval(()=>{

            count++;

            pressureChart.data.labels.push(count + "초");
            pressureChart.data.datasets[0].data.push(pressureValue);

            pressureChart.update();

            sameTime++;

            if(sameTime >= limit){

                document.getElementById("warningBox").style.display =
                    "block";

                alert("분실물 감지! 물건을 확인하세요.");

                clearInterval(interval);

                simulationRunning = false;

            }

        },1000);

    }

</script>

</body>
</html>
