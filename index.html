<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeTable</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
}

body{
    background:#111;
    color:white;
    overflow-x:hidden;
}

.app{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:100px;
}

/* 상단 */

.top{
    width:100%;
    padding:45px 20px;
    text-align:center;
    transition:0.5s;
}

.danger{
    background:linear-gradient(135deg,#5a0000,#cf0000);
}

.safe{
    background:linear-gradient(135deg,#004d2a,#00b85c);
}

.title{
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.status{
    font-size:24px;
    margin-top:10px;
}

.device{
    margin-top:8px;
    opacity:0.9;
    font-size:17px;
}

/* 연결 후 축소 */

.connectedCompact{
    padding:25px 20px;
}

.connectedCompact .title{
    font-size:34px;
}

.connectedCompact .status{
    font-size:19px;
}

.connectedCompact .device{
    font-size:15px;
}

/* 버튼 */

.connectBtn{
    margin-top:20px;
    padding:14px 28px;
    border:none;
    border-radius:18px;
    background:white;
    color:black;
    font-size:17px;
    cursor:pointer;
    font-weight:bold;
}

/* 페이지 */

.page{
    display:none;
    width:100%;
    padding:25px;
}

.active{
    display:block;
}

/* 카드 */

.card{
    background:#1d1d1d;
    border-radius:22px;
    padding:22px;
    margin-bottom:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.card h2{
    margin-bottom:15px;
}

/* 경고 */

.warning{
    margin-top:25px;
    padding:20px;
    border-radius:15px;
    background:#ff3b3b;
    font-size:20px;
    display:none;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0.5;}
    100%{opacity:1;}
}

/* 하단 네비 */

.bottomNav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:90px;
    background:#181818;
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:2px solid #333;
}

.navBtn{
    background:none;
    border:none;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
    color:#8d8d8d;
    transition:0.3s;
}

.navText{
    font-size:14px;
}

.iconSVG{
    width:28px;
    height:28px;
    stroke:currentColor;
    fill:none;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
}

.activeNav{
    color:#b266ff;
}

/* 입력창 */

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    margin-bottom:20px;
    font-size:16px;
}

/* 그래프 */

canvas{
    background:white;
    border-radius:15px;
    padding:10px;
}

/* 정보 */

.infoBox{
    margin-top:20px;
    font-size:18px;
    line-height:1.9;
}

</style>
</head>

<body>

<div class="app">

    <!-- 상단 -->
    <div class="top danger" id="topArea">

        <div class="title">SafeTable</div>

        <div class="status" id="statusText">
            ⚠ 분실 위험 있음
        </div>

        <div class="device" id="deviceText">
            현재 연결된 기기 없음
        </div>

        <button class="connectBtn"
            id="connectBtn"
            onclick="toggleDevice()">

            장치 연결하기

        </button>

    </div>

    <!-- 홈 -->
    <div class="page active" id="homePage">

        <div class="card">

            <h2>현재 상태</h2>

            <p>
                물건이 일정 시간 이상 감지되면
                사용자에게 즉시 알림을 보냅니다.
            </p>

            <div class="infoBox">

                ⏱ 총 연결 시간 :
                <span id="connectedTime">0분 0초</span>

                <br><br>

                📡 현재 상태 :
                <span id="liveState">연결 대기중</span>

            </div>

            <div class="warning" id="warningBox">
                🚨 분실물 감지됨! 물건을 확인하세요.
            </div>

        </div>

    </div>

    <!-- 설정 -->
    <div class="page" id="settingPage">

        <div class="card">

            <h2>설정</h2>

            <label>사용자 이름</label>
            <input type="text" placeholder="사용자 이름 입력">

            <label>기기 이름</label>
            <input type="text" placeholder="예 : Table Sensor #03">

            <label>압력 감지 시간 (초)</label>
            <input type="number" id="timeLimit" value="10">

            <label>알림 방식</label>
            <input type="text" placeholder="앱 알림">

        </div>

    </div>

    <!-- 그래프 -->
    <div class="page" id="graphPage">

        <div class="card">

            <h2>압력값 그래프</h2>

            <canvas id="pressureChart"></canvas>

        </div>

    </div>

</div>

<!-- 하단 네비 -->

<div class="bottomNav">

    <!-- 홈 -->
    <button class="navBtn activeNav"
        onclick="showPage('homePage', this)">

        <svg class="iconSVG" viewBox="0 0 24 24">
            <path d="M3 10.5L12 3L21 10.5"/>
            <path d="M5 9.5V21H19V9.5"/>
        </svg>

        <div class="navText">홈</div>

    </button>

    <!-- 설정 -->
    <button class="navBtn"
        onclick="showPage('settingPage', this)">

        <svg class="iconSVG" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15
            a1.65 1.65 0 0 0 .33 1.82
            l.06.06
            a2 2 0 1 1-2.83 2.83
            l-.06-.06
            a1.65 1.65 0 0 0-1.82-.33
            1.65 1.65 0 0 0-1 1.51V21
            a2 2 0 1 1-4 0
            v-.09
            a1.65 1.65 0 0 0-1-1.51
            1.65 1.65 0 0 0-1.82.33
            l-.06.06
            a2 2 0 1 1-2.83-2.83
            l.06-.06
            a1.65 1.65 0 0 0 .33-1.82
            1.65 1.65 0 0 0-1.51-1H3
            a2 2 0 1 1 0-4
            h.09
            a1.65 1.65 0 0 0 1.51-1
            1.65 1.65 0 0 0-.33-1.82
            l-.06-.06
            a2 2 0 1 1 2.83-2.83
            l.06.06
            a1.65 1.65 0 0 0 1.82.33
            h.09
            a1.65 1.65 0 0 0 1-1.51V3
            a2 2 0 1 1 4 0
            v.09
            a1.65 1.65 0 0 0 1 1.51
            1.65 1.65 0 0 0 1.82-.33
            l.06-.06
            a2 2 0 1 1 2.83 2.83
            l-.06.06
            a1.65 1.65 0 0 0-.33 1.82
            v.09
            a1.65 1.65 0 0 0 1.51 1H21
            a2 2 0 1 1 0 4
            h-.09
            a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>

        <div class="navText">설정</div>

    </button>

    <!-- 그래프 -->
    <button class="navBtn"
        onclick="showPage('graphPage', this)">

        <svg class="iconSVG" viewBox="0 0 24 24">
            <path d="M3 3V21H21"/>
            <path d="M7 16L11 12L14 15L20 8"/>
        </svg>

        <div class="navText">압력값 그래프</div>

    </button>

</div>

<script>

/* 변수 */

let connected = false;
let connectSeconds = 0;
let pressureValue = 50;
let sameTime = 0;
let interval;
let warningSent = false;

/* 페이지 이동 */

function showPage(pageId, element){

    let pages = document.querySelectorAll(".page");

    pages.forEach(page=>{
        page.classList.remove("active");
    });

    document.getElementById(pageId)
        .classList.add("active");

    let navs = document.querySelectorAll(".navBtn");

    navs.forEach(nav=>{
        nav.classList.remove("activeNav");
    });

    element.classList.add("activeNav");

}

/* 그래프 */

const ctx =
document.getElementById('pressureChart');

const pressureChart = new Chart(ctx, {

    type:'line',

    data:{
        labels:[],
        datasets:[{
            label:'압력값',
            data:[],
            borderColor:'#b266ff',
            borderWidth:3,
            tension:0.3
        }]
    },

    options:{
        responsive:true,
        scales:{
            y:{
                beginAtZero:true
            }
        }
    }

});

/* 장치 연결 / 해제 */

function toggleDevice(){

    const topArea =
        document.getElementById("topArea");

    const statusText =
        document.getElementById("statusText");

    const deviceText =
        document.getElementById("deviceText");

    const connectBtn =
        document.getElementById("connectBtn");

    const liveState =
        document.getElementById("liveState");

    /* 연결 */

    if(!connected){

        connected = true;
        warningSent = false;

        topArea.classList.remove("danger");
        topArea.classList.add("safe");
        topArea.classList.add("connectedCompact");

        statusText.innerHTML =
            "✔ 기기 연결됨";

        deviceText.innerHTML =
            "연결된 기기 : Table Sensor #03";

        connectBtn.innerHTML =
            "장치 해제하기";

        liveState.innerHTML =
            "압력 감지중";

        startPressure();

    }

    /* 해제 */

    else{

        connected = false;

        topArea.classList.remove("safe");
        topArea.classList.remove("connectedCompact");
        topArea.classList.add("danger");

        statusText.innerHTML =
            "⚠ 분실 위험 있음";

        deviceText.innerHTML =
            "현재 연결된 기기 없음";

        connectBtn.innerHTML =
            "장치 연결하기";

        liveState.innerHTML =
            "연결 종료됨";

        clearInterval(interval);

        connectSeconds = 0;

        document.getElementById("connectedTime")
            .innerHTML = "0분 0초";

        document.getElementById("warningBox")
            .style.display = "none";

    }

}

/* 연결 시간 */

setInterval(()=>{

    if(connected){

        connectSeconds++;

        let min =
            Math.floor(connectSeconds / 60);

        let sec =
            connectSeconds % 60;

        document.getElementById("connectedTime")
            .innerHTML =
            min + "분 " + sec + "초";

    }

},1000);

/* 압력 감지 */

function startPressure(){

    sameTime = 0;

    let limit =
        parseInt(
            document.getElementById("timeLimit").value
        );

    interval = setInterval(()=>{

        let current = new Date();

        let hour =
            current.getHours()
            .toString()
            .padStart(2,'0');

        let minute =
            current.getMinutes()
            .toString()
            .padStart(2,'0');

        let second =
            current.getSeconds()
            .toString()
            .padStart(2,'0');

        let timeLabel =
            hour + ":" + minute + ":" + second;

        pressureChart.data.labels.push(timeLabel);

        pressureChart.data.datasets[0]
            .data.push(pressureValue);

        pressureChart.update();

        sameTime++;

        if(sameTime >= limit && !warningSent){

            warningSent = true;

            document.getElementById("warningBox")
                .style.display = "block";

            alert(
                "분실물 감지! 물건을 확인하세요."
            );

        }

    },1000);

}

</script>

</body>
</html>
